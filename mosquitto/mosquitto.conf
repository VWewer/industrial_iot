# mosquitto/mosquitto.conf
# Minimal Mosquitto config for the Industrial IoT demo.
# Place this file at: mosquitto/mosquitto.conf (relative to docker-compose.yml)

listener 1883
listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
